<body>

<div class="overlay"></div>

<div class="container fade">
  <h4>
    I honestly don’t know what the future has in store for us...
  </h4>
  <h2>
    So I would like to ask you: Would you accept to date me?
  </h2>

  <div class="buttons">
    <button id="yes" onclick="aceitou()">Yes!</button>
    <button id="no" onmouseover="foge()">No</button>
  </div>
</div>

<script>
function aceitou() {
    alert("EU SOU CASADOOOO, YEAAAH!!");
}

function foge() {
    let btn = document.getElementById("no");

    let y = Math.random() * 200 - 100;
    btn.style.transform = `translate(${x}px, ${y}px)`;
}
</script>
